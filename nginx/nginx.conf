upstream app_backend {
    server app:3501;
}

upstream web_frontend {
    server web:3000;
}

upstream image_server {
    server app:3500;
}

server {
    listen 80;
    server_name _;

    # ── Next.js dashboard (default) ──────────────────────────────────
    location / {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Worker API (direct — skips Next.js proxy overhead) ───────────
    location /api/ {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Socket.IO for real-time dashboard updates ────────────────────
    location /socket.io/ {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ── Dashboard image previews ─────────────────────────────────────
    location /images/ {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    # ── Next.js HMR websocket (dev only, harmless in prod) ───────────
    location /_next/webpack-hmr {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# ── Image server for Meta API (separate port) ───────────────────────────────
# Meta Graph API needs a publicly reachable URL to download images/videos.
# IMAGE_SERVER_PUBLIC_URL should be set to http://<EC2-PUBLIC-IP>:3500
server {
    listen 3500;
    server_name _;

    location / {
        proxy_pass         http://image_server;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
