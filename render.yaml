services:
  - type: web
    name: tv-trade-poster
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: WEBSOCKET_URL
        value: https://terminal.finosauras.com
      - key: IMAGE_HOST_TYPE
        value: external
      - key: SOCKET_TOKEN
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_API_VERSION
        value: v19.0
      - key: IG_DAILY_POST_LIMIT
        value: "100"
      - key: WATERMARK_TEXT
        sync: false
      - key: LOG_LEVEL
        value: info
