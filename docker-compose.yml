services:
  # ── Worker: WebSocket listener + image generator + Instagram poster ────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tv-trade-poster-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./posts_history.json:/app/posts_history.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3501/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web: Next.js dashboard ────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: tv-trade-poster-web
    restart: unless-stopped
    environment:
      - WORKER_URL=http://app:3501
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Nginx: reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tv-trade-poster-nginx
    restart: unless-stopped
    ports:
      - "80:80"      # Dashboard (public)
      - "3500:3500"  # Image server (Meta API needs this)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - web
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
